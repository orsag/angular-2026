server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # NEW SECTION: Forward API calls to your Mac's localhost
    location /api/ {
        # 'host.docker.internal' is a special DNS name for your Mac's localhost inside Docker
        proxy_pass http://host.docker.internal:3000/; 
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}