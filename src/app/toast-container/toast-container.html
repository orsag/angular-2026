<div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3" style="z-index: 1080">
    @for (toast of notify.toasts(); track toast.id) {
    <div class="toast show align-items-center text-white border-0 mb-2" [class.bg-success]="toast.type === 'success'"
        [class.bg-danger]="toast.type === 'danger'" [class.bg-warning]="toast.type === 'warning'"
        [class.bg-info]="toast.type === 'info'" role="alert">
        <div class="d-flex">
            <div class="toast-body">
                {{ toast.message }}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="notify.remove(toast.id)">
            </button>
        </div>
    </div>
    }
</div>
