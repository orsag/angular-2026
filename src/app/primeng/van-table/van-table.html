<div class="card shadow-sm border-0 p-4">
    <h3 class="text-primary mb-4">Van Fleet Management</h3>

    <p-table [value]="vans()" [columns]="cols" [loading]="isLoading()" [paginator]="true" [rows]="5"
        [tableStyle]="{ 'min-width': '50rem' }" styleClass="p-datatable-striped">

        <ng-template pTemplate="caption">
            <div class="flex">
                <span class="p-input-icon-left ml-auto">
                    <i class="pi pi-search"></i>
                    <input pInputText type="text" (input.debounce.500)="updateSearch($any($event.target).value)"
                        placeholder="Search vans" />
                </span>
            </div>
        </ng-template>

        <ng-template pTemplate="header" let-columns>
            <tr>
                @for (col of columns; track col.field) {
                <th>{{ col.header }}</th>
                }
                <th style="width: 5rem">Actions</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-rowData let-columns="columns">
            <tr>
                @for (col of columns; track col.field) {
                <td>
                    @if (col.field === 'cargoCapacity') {
                    {{ rowData[col.field] | number }} L
                    } @else {
                    {{ rowData[col.field] }}
                    }
                </td>
                }
                <td>
                    <button class="btn btn-sm btn-outline-primary border-0">
                        <i class="bi bi-pencil"></i>
                    </button>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td [attr.colspan]="cols.length + 1" class="text-center p-4">
                    No vans found in the fleet.
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
