<div class="container py-5">
  <div class="card shadow border-0">
    <div class="card-header bg-dark text-white p-4">
      <div class="d-flex align-items-center gap-3">
        <h3 class="mb-0">User Directory</h3>

        <div class="spinner-border text-info" [class.invisible]="!(service.loading$ | async)"
          style="width: 1.5rem; height: 1.5rem; border-width: 0.2em;" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>

    <div class="card-body p-4">
      <div class="row g-3 mb-4">
        <div class="col-md-8">
          <input type="text" (input)="onSearch($event)" class="form-control" placeholder="Search by name...">
        </div>
        <div class="col-md-4">
          <select (change)="onFilter($event)" class="form-select">
            <option value="all">All Email Domains</option>
            <option value=".biz">Commercial (.biz)</option>
            <option value=".tv">Media (.tv)</option>
            <option value=".io">Tech (.io)</option>
          </select>
        </div>
      </div>

      <div class="row" [class.opacity-25]="service.loading$ | async">
        @for (user of users$ | async; track user.id) {
        <div class="col-md-6 mb-3">
          <div class="p-3 border rounded shadow-sm hover-shadow bg-light">
            <div class="d-flex justify-content-between align-items-center">
              <h6 class="mb-0 text-primary">{{ user.name }}</h6>
              <span class="badge bg-secondary">ID: {{ user.id }}</span>
            </div>
            <small class="text-muted d-block mt-1">{{ user.company.name }}</small>
            <div class="mt-2 small font-monospace">{{ user.email }}</div>
          </div>
        </div>
        } @empty {
        @if (!(service.loading$ | async)) {
        <div class="text-center py-5 text-muted">
          <i class="bi bi-search fs-1 d-block mb-3"></i>
          No users match your criteria.
        </div>
        }
        }
      </div>
    </div>
  </div>
</div>
