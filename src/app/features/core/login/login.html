<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px;">
        <div class="card-body p-5 text-center">

            <div class="mb-4">
                <i class="bi bi-truck text-primary" style="font-size: 3rem;"></i>
                <h2 class="fw-bold mt-2">VanFleet Pro</h2>
                <p class="text-muted">Sign in to manage your fleet</p>
            </div>

            @if (errorMessage()) {
            <div class="alert alert-danger py-2 small mb-3">
                {{ errorMessage() }}
            </div>
            }

            <form (submit)="$event.preventDefault(); onLogin()">
                <div class="form-floating mb-3 text-start">
                    <input type="email" class="form-control" id="emailInput" placeholder="name@example.com"
                        [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required>
                    <label for="emailInput">Email address</label>
                </div>

                <div class="form-floating mb-4 text-start">
                    <input type="password" class="form-control" id="passInput" placeholder="Password"
                        [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" required>
                    <label for="passInput">Password</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm"
                    [disabled]="isLoading() || !email() || !password()">
                    @if (isLoading()) {
                    <span class="spinner-border spinner-border-sm me-2"></span>
                    }
                    Sign In
                </button>
            </form>

            <div class="mt-4 small">
                <p class="text-muted">MSW Mock Mode Active</p>
            </div>

        </div>
    </div>
</div>
